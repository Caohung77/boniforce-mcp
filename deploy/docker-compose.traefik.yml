# Compose file for hosts that already run Traefik fronting traefik-public.
# Builds the local Dockerfile and registers a Host(`mcp.boniforce.de`) router
# with HTTP-01 Let's Encrypt via the existing letsencrypt cert resolver.
services:
  mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: boniforce-mcp
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - mcp-data:/var/lib/boniforce-mcp
    networks:
      - traefik-public
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # HTTP -> HTTPS redirect
      - "traefik.http.routers.boniforce-mcp-http.rule=Host(`mcp.boniforce.de`)"
      - "traefik.http.routers.boniforce-mcp-http.entrypoints=web"
      - "traefik.http.routers.boniforce-mcp-http.middlewares=boniforce-mcp-redirect"
      - "traefik.http.middlewares.boniforce-mcp-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.boniforce-mcp-redirect.redirectscheme.permanent=true"

      # HTTPS router with Let's Encrypt
      - "traefik.http.routers.boniforce-mcp.rule=Host(`mcp.boniforce.de`)"
      - "traefik.http.routers.boniforce-mcp.entrypoints=websecure"
      - "traefik.http.routers.boniforce-mcp.tls=true"
      - "traefik.http.routers.boniforce-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.boniforce-mcp.loadbalancer.server.port=8000"

volumes:
  mcp-data:

networks:
  traefik-public:
    external: true
